; Chronicle — example configuration
; Copy this file to config.ini and fill in your values.

; ─── Timezone ────────────────────────────────────────────────────────────────
;
; IANA timezone name used for displaying dates and times. All timestamps are
; stored in UTC; this timezone is applied when rendering them (for example, in
; the HTML UI). Defaults to UTC if not set.

chronicle.timezone = UTC

; ─── Database ────────────────────────────────────────────────────────────────
;
; Chronicle requires a database. The connection key must be
; "chronicle" — it is referenced by name in the mappers and services.

db.chronicle.type   = mysql
db.chronicle.server = localhost
db.chronicle.port   = 3306
db.chronicle.db     = chronicle
db.chronicle.user   = chronicle
db.chronicle.pass   = secret

; ─── Google OAuth (optional) ─────────────────────────────────────────────────
;
; When these three keys are present and non-empty, a "Sign in with Google"
; button appears on the login page. If they are absent or empty, only
; email/password authentication is offered.
;
; Setup steps:
;   1. Go to https://console.cloud.google.com/apis/credentials
;   2. Create an OAuth 2.0 Client ID (application type: Web application).
;   3. Add your callback URL to "Authorized redirect URIs", e.g.:
;        https://chronicle.example.com/auth/callback
;   4. Copy the Client ID and Client Secret shown after creation.

;chronicle.google.client_id      = your-client-id.apps.googleusercontent.com
;chronicle.google.client_secret  = your-client-secret
;chronicle.google.redirect_uri   = https://chronicle.example.com/auth/callback
;
; Optional: restrict login to specific email domains (comma-separated).
; When absent, any Google account may authenticate successfully.
;chronicle.google.allowed_domains = example.com,anotherdomain.com

; ─── External plugins (optional) ────────────────────────────────────────────
;
; Comma-separated list of fully-qualified class names for plugins installed
; outside the Chronicle application directory (e.g. via a separate Composer
; package). Each class must extend AbstractPlugin and declare a DESCRIPTION
; constant. Built-in plugins (DatoCMS, JsonPath) are always available and do
; not need to be listed here.

;chronicle.plugins = \Foo\Bar\MyPlugin, \Acme\Chronicle\AnotherPlugin

; ─── JSONPath plugin (optional, repeatable per source/type) ──────────────────
;
; When a type is configured to use the "JSONPath (config-driven)" plugin,
; Chronicle reads JSONPath expressions from config.ini to extract each log
; field from the incoming webhook payload.
;
; Keys are scoped to source and type name exactly as they appear in the
; database (matching the URL path segments /webhook/{source}/{type}).
;
; Required keys — an error is returned if these are missing or match nothing:
;   chronicle.plugin.{source}.{type}.object_id   = $.path.to.id
;   chronicle.plugin.{source}.{type}.action      = $.path.to.action
;   chronicle.plugin.{source}.{type}.change_date = $.path.to.timestamp
;
; Optional keys — omit if not available in the payload:
;   chronicle.plugin.{source}.{type}.version     = $.path.to.version
;   chronicle.plugin.{source}.{type}.data        = $.path.to.object
;   chronicle.plugin.{source}.{type}.changed_by  = $.path.to.user
;
; Action mapping (optional) — comma-separated raw values that map to each
; canonical action. Unlisted values are passed through as-is.
;   chronicle.plugin.{source}.{type}.create_actions = create,publish
;   chronicle.plugin.{source}.{type}.update_actions = update,save
;   chronicle.plugin.{source}.{type}.delete_actions = delete,unpublish,archive
;
; Example for source "my-app", type "orders":
;chronicle.plugin.my-app.orders.object_id      = $.order.id
;chronicle.plugin.my-app.orders.action         = $.event
;chronicle.plugin.my-app.orders.change_date    = $.occurred_at
;chronicle.plugin.my-app.orders.version        = $.order.version
;chronicle.plugin.my-app.orders.data           = $.order
;chronicle.plugin.my-app.orders.changed_by     = $.actor.email
;chronicle.plugin.my-app.orders.create_actions = placed
;chronicle.plugin.my-app.orders.update_actions = updated,fulfilled
;chronicle.plugin.my-app.orders.delete_actions = cancelled,refunded
